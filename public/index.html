<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Dịch vụ Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-height-screen p-6">

    <div class="max-w-md w-full bg-white rounded-xl shadow-md overflow-hidden p-6 space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800">Gói Dịch Vụ Premium</h1>
            <p class="text-gray-500 mt-2">Giải pháp tối ưu cho hệ thống của bạn</p>
            <div class="mt-4 text-3xl font-extrabold text-blue-600">$19.99 <span class="text-sm font-normal text-gray-400">/ tháng</span></div>
        </div>

        <hr class="border-gray-200">

        <form action="/checkout" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Họ và tên</label>
                <input type="text" name="name" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Email nhận dịch vụ</label>
                <input type="email" name="email" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:offset-2 focus:ring-blue-500 conversion-button">
                Mua Ngay Như Hệ Thống Đã Sẵn Sàng
            </button>
        </form>
    </div>

</body>
</html>
